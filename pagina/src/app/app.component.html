<header class="navbar">
  <div class="navbar__left">
    <div class="navbar__logos">
      <img
        src="assets/logo_Lidera.png"
        alt="Logo Halley"
        class="navbar__logo"
      />
      <img
        src="assets/logo_halley.png"
        alt="Logo Lidera"
        class="navbar__logo"
      />
      <img
        src="assets/logo_Lago.png"
        alt="Logo Lago"
        class="navbar__logo2"
      />
    </div>

    <span class="navbar__separator"></span>

    <span class="navbar__brand">Generador global del flujo de muones</span>
  </div>

  <nav class="navbar__tabs">
    <a
      routerLink="/"
      routerLinkActive="tab--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="tab"
      >Inicio</a
    >
    <a routerLink="/simulador" routerLinkActive="tab--active" class="tab"
      >Simulador</a
    >
    <a routerLink="/descripcion" routerLinkActive="tab--active" class="tab"
      >Descripción</a
    >
    <a routerLink="/descargas" routerLinkActive="tab--active" class="tab"
      >Descargas</a
    >
  </nav>
</header>

  <router-outlet></router-outlet>
</main>
